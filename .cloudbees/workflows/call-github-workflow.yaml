apiVersion: automation.cloudbees.io/v1alpha1
kind: workflow
name: call-github-workflow
on:
  workflow_dispatch:

jobs:
  do-work:
    steps:
      - name: run external github workflow
        uses: https://github.com/cloudbees-io/ghactions-run-workflow@v2
        with:
          token: ${{ secrets.GHA_TOKEN }}
          org-name: hussain0510
          repo-name: infrastructure-repository
          branch-name: main
          workflow-name: Terraform CI/CD Pipeline